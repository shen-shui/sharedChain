server:
  port: 8514

spring:
  application:
    name: service-order
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/db_spzx?characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 1234
  data:
    redis:
      host: localhost
      port: 6379

# RocketMQ：需先启动 NameServer（默认 9876）与 Broker，并创建 Topic ORDER_EVENT 或开启自动创建
rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: spzx-order-producer-group

mybatis:
  config-location: classpath:mybatis-config.xml
  mapper-locations: classpath:mapper/*/*.xml

spzx:
  seckill:
    reservation-compensation-delay-ms: 60000
    reservation-reconcile-delay-ms: 300000